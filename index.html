        .content {
            margin: 30px auto;
            width: 85%;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            animation: fade 0.5s;
        }

        .content img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        @keyframes fade {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
